<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>符合嚴格規範的響應式網頁範本</title>
    
    <meta name="description" content="這是一個完全符合指定規範的 HTML 網頁範本。包含基本的標籤結構、SEO 優化設定、無障礙圖片 alt 屬性、有效的超連結，以及支援從 320px 到 1440px 寬度的流暢響應式設計，確保無水平捲動軸。">

    <style>
        /* 基礎重置，確保寬度計算包含 padding 和 border，避免水平捲動 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 設定最大寬度與隱藏 X 軸溢出，徹底杜絕水平捲動軸 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 100vw;
            overflow-x: hidden;
            background-color: #f4f4f9;
        }

        /* 內容容器響應式設計 */
        .container {
            width: 100%;
            max-width: 1200px; /* 在 1440px 視窗下會居中留白，不會捲動 */
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 15px;
        }

        /* 確保圖片具備響應式，在 320px 等小螢幕下會自動縮小 */
        img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* 連結樣式 */
        a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>歡迎來到標準 HTML 響應式範本</h1>

        <p>這個頁面嚴格遵守了所有的結構與設計規範。您可以縮放視窗測試 320px、768px 或 1440px 的顯示效果，內容會自動適應且不會出現水平捲動軸。</p>

        <img src="https://via.placeholder.com/800x400" alt="一張用於展示響應式設計的佔位圖片，包含藍色背景與尺寸文字">

        <p>想要了解更多網頁設計規範，請造訪 <a href="https://developer.mozilla.org/zh-TW/" target="_blank" rel="noopener noreferrer">MDN Web Docs 官方文件</a>。</p>
    </div>

</body>
</html>
